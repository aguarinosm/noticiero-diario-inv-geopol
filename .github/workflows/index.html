<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar Geopolítico & Inversión</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-900 text-slate-200 font-sans">
    
    <!-- Cabecera -->
    <header class="bg-slate-800 border-b border-slate-700 p-6 shadow-lg">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-bold text-white tracking-tight"><i class="fas fa-globe-americas text-blue-500 mr-3"></i>Radar Global</h1>
                <p class="text-slate-400 text-sm mt-1">Inteligencia de Mercado y Geopolítica | Actualizado Automáticamente</p>
            </div>
            <div class="text-right">
                <p class="text-xs text-slate-500 uppercase tracking-widest">Analista Senior</p>
                <p class="font-semibold text-blue-400">Abel Guarinos Marín</p>
            </div>
        </div>
    </header>

    <!-- Contenedor Principal de Noticias -->
    <main class="max-w-7xl mx-auto p-6 mt-6">
        <div id="news-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- Las noticias se inyectarán aquí mediante Javascript -->
        </div>
    </main>

    <script>
        // Esta función lee el archivo que nuestro robot crea todos los días
        async function loadNews() {
            const container = document.getElementById('news-container');
            container.innerHTML = '<p class="text-center col-span-full text-slate-500 animate-pulse">Analizando fuentes oficiales de mercado...</p>';
            
            try {
                // Truco para evitar la caché y traer siempre el dato más reciente
                const response = await fetch('data.json?v=' + new Date().getTime()); 
                const data = await response.json();
                container.innerHTML = ''; // Limpiamos el mensaje de carga

                for (const [category, articles] of Object.entries(data)) {
                    let html = `
                    <div class="bg-slate-800 rounded-xl p-6 shadow-xl border border-slate-700/50 hover:border-blue-500/50 transition-colors">
                        <h2 class="text-xl font-bold text-white mb-4 border-b border-slate-600 pb-2"><i class="fas fa-chart-line text-blue-400 mr-2"></i>${category}</h2>
                        <div class="space-y-4">
                    `;
                    
                    articles.forEach(article => {
                        html += `
                            <article class="group">
                                <a href="${article.link}" target="_blank" class="block">
                                    <p class="text-xs text-slate-400 mb-1"><i class="far fa-clock mr-1"></i>${article.date.substring(0, 16)}</p>
                                    <h3 class="text-sm font-medium text-slate-200 group-hover:text-blue-400 transition-colors leading-snug">${article.title}</h3>
                                </a>
                            </article>
                        `;
                    });

                    html += `</div></div>`;
                    container.innerHTML += html;
                }
            } catch (error) {
                container.innerHTML = '<p class="text-center col-span-full text-red-400">El robot está generando el primer informe. Recarga en unos minutos.</p>';
            }
        }

        loadNews();
    </script>
</body>
</html>
