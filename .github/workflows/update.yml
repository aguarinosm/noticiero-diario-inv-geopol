name: Actualizacion Diaria de Noticias

on:
  schedule:
    - cron: '0 6 * * *' # Se ejecuta todos los días a las 6:00 AM UTC
  workflow_dispatch: # Permite darle al botón para actualizar manualmente si quieres

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Clonar el repositorio
        uses: actions/checkout@v3

      - name: Configurar motor Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Instalar librerías de lectura RSS
        run: pip install feedparser

      - name: Ejecutar el analista automático
        run: python update_news.py

      - name: Guardar y publicar nuevos datos
        run: |
          git config --global user.name 'Analista-Bot'
          git config --global user.email 'bot@tusitio.com'
          git add data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Actualización automática de mercado" && git push)
